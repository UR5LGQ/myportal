<!DOCTYPE html>
<html>
<body>

<h2>Содержимое playlist.m3u:</h2>
<pre id="output">Загрузка...</pre>

<script>
fetch('playlist.m3u')
  .then(response => response.text())
  .then(text => {
    document.getElementById('output').textContent = text;
  })
  .catch(error => {
    document.getElementById('output').textContent =
      'Ошибка загрузки: ' + error;
  });
</script>

</body>
</html>
