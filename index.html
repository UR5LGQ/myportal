<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Portal (MP4 + M3U8)</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial,sans-serif;
  margin:0;
  padding:20px;
  text-align:center;
}

#status{
  margin-bottom:10px;
  color:#aaa;
}

.player-wrapper{
  position:relative;
  max-width:900px;
  margin:auto;
}

#video{
  width:100%;
  background:black;
}

#titleOverlay{
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(0,0,0,.7);
  padding:8px 14px;
  border-radius:8px;
}

#urlDisplay{
  margin-top:10px;
  color:#66ccff;
  font-size:12px;
  word-break:break-all;
  max-width:900px;
  margin-left:auto;
  margin-right:auto;
}

#channels{
  margin-top:20px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.channel-btn{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#333;
  color:#fff;
  cursor:pointer;
}

.channel-btn:hover{background:#555;}
.channel-btn.active{background:#0084ff;}
</style>
</head>
<body>

<div id="status">Загрузка playlist...</div>

<div class="player-wrapper">
  <video id="video" controls autoplay muted playsinline></video>
  <div id="titleOverlay">Нет названия</div>
</div>

<div id="urlDisplay"></div>
<div id="channels"></div>

<script>
const video = document.getElementById('video');
const statusEl = document.getElementById('status');
const titleOverlay = document.getElementById('titleOverlay');
const urlDisplay = document.getElementById('urlDisplay');
const channelsEl = document.getElementById('channels');

let channels = [];
let currentIndex = -1;
let hlsInstance = null;

function setStatus(t){ statusEl.textContent = t; }

async function loadPlaylist(){
  try{
    const res = await fetch('playlist.m3u?t=' + Date.now());
    const text = await res.text();

    const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
    const old = JSON.stringify(channels);

    channels = [];

    for(let i=0;i<lines.length;i++){
      if(lines[i].startsWith('#EXTINF')){
        const title = lines[i].split(',').slice(1).join(',').trim();
        const url = lines[i+1];
        if(url && url.startsWith('http')){
          channels.push({title,url});
        }
      }
    }

    renderChannels();

    if(currentIndex === -1 && channels.length){
      playChannel(0);
    } else if(old !== JSON.stringify(channels) && currentIndex >= 0 && channels[currentIndex]){
      playChannel(currentIndex);
    }

    setStatus('Playlist загружен');

  }catch(e){
    console.error(e);
    setStatus('Ошибка загрузки playlist');
  }
}

function renderChannels(){
  channelsEl.innerHTML = '';

  channels.forEach((ch,i)=>{
    const b = document.createElement('button');
    b.className = 'channel-btn' + (i===currentIndex?' active':'');
    b.textContent = ch.title;
    b.onclick = ()=>playChannel(i);
    channelsEl.appendChild(b);
  });
}

async function playChannel(i){
  if(i===currentIndex) return;

  currentIndex = i;
  const ch = channels[i];

  titleOverlay.textContent = ch.title;
  urlDisplay.textContent = ch.url;

  // очистка старого потока
  if(hlsInstance){
    hlsInstance.destroy();
    hlsInstance = null;
  }

  video.pause();
  video.removeAttribute('src');
  video.load();

  // MP4
  if(ch.url.includes('.mp4')){
    video.src = ch.url;
    video.load();
    try{ await video.play(); }catch{}
  }

  // M3U8
  else if(ch.url.includes('.m3u8')){
    if(Hls.isSupported()){
      hlsInstance = new Hls();
      hlsInstance.loadSource(ch.url);
      hlsInstance.attachMedia(video);

      hlsInstance.on(Hls.Events.MANIFEST_PARSED, async ()=>{
        try{ await video.play(); }catch{}
      });

    } else {
      setStatus('HLS не поддерживается');
    }
  }

  renderChannels();
}

loadPlaylist();
setInterval(loadPlaylist,10000);
</script>

</body>
</html>
