<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Auto IPTV Player</title>
<style>
  body {
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
    text-align:center;
    margin:0;
    padding:20px;
  }

  #status {
    margin-bottom:10px;
    font-size:14px;
    color:#aaa;
  }

  #video {
    width:100%;
    max-width:900px;
    transition:opacity 0.5s ease;
    opacity:1;
    background:black;
  }

  .fade-out {
    opacity:0.2;
  }
</style>
</head>
<body>

<div id="status">Инициализация...</div>

<video id="video" controls autoplay></video>

<script>
const video = document.getElementById('video');
const statusEl = document.getElementById('status');

let currentUrl = '';
let checkInterval = 3000;

function setStatus(text) {
  statusEl.textContent = text;
}

async function switchVideo(newUrl) {
  if (!newUrl || newUrl === currentUrl) return;

  setStatus('Обновление видео...');
  video.classList.add('fade-out');

  const wasPlaying = !video.paused;

  await new Promise(r => setTimeout(r, 500));

  currentUrl = newUrl;
  video.src = newUrl;
  video.load();

  if (wasPlaying || video.autoplay) {
    try {
      await video.play();
    } catch {}
  }

  video.classList.remove('fade-out');
  setStatus('Видео обновлено');
}

async function checkPlaylist() {
  try {
    setStatus('Проверка playlist...');

    const response = await fetch('playlist.m3u?t=' + Date.now());
    const text = await response.text();

    const lines = text
      .split('\n')
      .map(l => l.trim())
      .filter(Boolean);

    const newUrl = lines.find(l => l.startsWith('http'));

    if (!newUrl) {
      setStatus('Ссылка в playlist не найдена');
      return;
    }

    if (newUrl !== currentUrl) {
      await switchVideo(newUrl);
    } else {
      setStatus('Без изменений');
    }

  } catch (err) {
    console.error(err);
    setStatus('Ошибка загрузки playlist');
  }
}

checkPlaylist();
setInterval(checkPlaylist, checkInterval);
</script>

</body>
</html>
