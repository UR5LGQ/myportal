<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Portal</title>
<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial,sans-serif;
  margin:0;
  padding:20px;
  text-align:center;
}
#status{
  margin-bottom:10px;
  color:#aaa;
}
.player-wrapper{
  position:relative;
  max-width:900px;
  margin:auto;
}
#video{
  width:100%;
  background:black;
}
#titleOverlay{
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(0,0,0,.7);
  padding:8px 14px;
  border-radius:8px;
}
#urlDisplay{
  margin-top:10px;
  color:#66ccff;
  font-size:12px;
  word-break:break-all;
  max-width:900px;
  margin-left:auto;
  margin-right:auto;
}
#channels{
  margin-top:20px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}
.channel-btn{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#333;
  color:#fff;
  cursor:pointer;
}
.channel-btn:hover{
  background:#555;
}
.channel-btn.active{
  background:#0084ff;
}
</style>
</head>
<body>

<div id="status">Загрузка playlist...</div>

<div class="player-wrapper">
  <video id="video" controls autoplay></video>
  <div id="titleOverlay">Нет названия</div>
</div>

<div id="urlDisplay"></div>
<div id="channels"></div>

<script>
const video = document.getElementById('video');
const statusEl = document.getElementById('status');
const titleOverlay = document.getElementById('titleOverlay');
const channelsEl = document.getElementById('channels');
const urlDisplay = document.getElementById('urlDisplay');

let channels = [];
let currentIndex = -1;

function setStatus(text){
  statusEl.textContent = text;
}

async function loadPlaylist(){
  try{
    const res = await fetch('playlist.m3u?t=' + Date.now());
    const text = await res.text();

    const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
    const oldChannelsJson = JSON.stringify(channels);

    channels = [];

    for(let i=0;i<lines.length;i++){
      if(lines[i].startsWith('#EXTINF')){
        const title = lines[i].split(',').slice(1).join(',').trim();
        const url = lines[i+1];
        if(url && url.startsWith('http')){
          channels.push({title,url});
        }
      }
    }

    renderChannels();

    if(currentIndex === -1 && channels.length){
      playChannel(0);
    } else if (JSON.stringify(channels) !== oldChannelsJson && currentIndex >= 0 && channels[currentIndex]) {
      const idx = currentIndex;
      currentIndex = -1;
      playChannel(idx);
    }

    setStatus('Playlist загружен');

  }catch(err){
    console.error(err);
    setStatus('Ошибка загрузки playlist');
  }
}

function renderChannels(){
  channelsEl.innerHTML = '';

  channels.forEach((ch,index)=>{
    const btn = document.createElement('button');
    btn.className = 'channel-btn' + (index===currentIndex?' active':'');
    btn.textContent = ch.title;
    btn.onclick = ()=>playChannel(index);
    channelsEl.appendChild(btn);
  });
}

async function playChannel(index){
  if(index===currentIndex) return;

  currentIndex = index;
  const ch = channels[index];

  video.pause();
  video.removeAttribute('src');
  video.load();

  await new Promise(r => setTimeout(r, 100));

  video.src = ch.url;
  video.load();

  titleOverlay.textContent = ch.title;
  urlDisplay.textContent = ch.url;

  try{
    await video.play();
  }catch(e){
    console.error('Ошибка воспроизведения:', e);
    setStatus('Ошибка воспроизведения видео');
  }

  renderChannels();
}

loadPlaylist();
setInterval(loadPlaylist,10000);
</script>

</body>
</html>
