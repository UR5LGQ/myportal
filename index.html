<!DOCTYPE html>
<html>
<body>

<video id="video" controls autoplay style="width:100%;max-width:900px;"></video>

<script>
const video = document.getElementById('video');
let currentUrl = '';

async function checkPlaylist() {
  try {
    const response = await fetch('playlist.m3u?t=' + Date.now());
    const text = await response.text();

    const lines = text
      .split('\n')
      .map(line => line.trim())
      .filter(Boolean);

    const newUrl = lines.find(line => line.startsWith('http'));

    if (newUrl && newUrl !== currentUrl) {
      currentUrl = newUrl;

      const wasPlaying = !video.paused;

      video.src = newUrl;
      video.load();

      if (wasPlaying || currentUrl === newUrl) {
        video.play().catch(() => {});
      }

      console.log('Видео обновлено:', newUrl);
    }
  } catch (err) {
    console.error('Ошибка чтения playlist:', err);
  }
}

// Первичная загрузка
checkPlaylist();

// Проверка каждые 10 секунд
setInterval(checkPlaylist, 10000);
</script>

</body>
</html>
